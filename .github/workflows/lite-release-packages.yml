name: Build Lite Release Packages

on:
  push:
    tags:
      - 'lite-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  desktop:
    name: Build Lite ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS DMG
            os: macos-latest
            command: npm run desktop:build -- --mac dmg --x64 --arm64
            artifact: lite-macos-dmg
            files: release-lite/*.dmg
          - name: Windows EXE
            os: windows-latest
            command: npm run desktop:build -- --win nsis --x64
            artifact: lite-windows-exe
            files: release-lite/*.exe

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Prepare lite assets
        run: npm run assets:lite

      - name: Build desktop package
        run: ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Rename lite desktop packages
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#lite-v}"
          mkdir -p release-lite
          if [[ "${{ matrix.os }}" == macos-* ]]; then
            cp release/*mac-arm64.dmg "release-lite/Colorbook-Echo-${VERSION}-lite-mac-arm64.dmg"
            cp release/*mac-x64.dmg "release-lite/Colorbook-Echo-${VERSION}-lite-mac-x64.dmg"
          else
            cp release/*windows-x64.exe "release-lite/Colorbook-Echo-${VERSION}-lite-windows-x64.exe"
          fi

      - name: Upload lite desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error

  android:
    name: Build Lite Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Prepare lite assets
        run: npm run assets:lite

      - name: Sync Capacitor
        run: npm run mobile:sync

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Collect lite APK
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#lite-v}"
          mkdir -p release-lite
          cp android/app/build/outputs/apk/debug/app-debug.apk "release-lite/Colorbook-Echo-${VERSION}-lite-android-debug.apk"

      - name: Upload lite Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: lite-android-apk
          path: release-lite/*.apk
          if-no-files-found: error

  ios:
    name: Build Lite iOS IPA
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Prepare lite assets
        run: npm run assets:lite

      - name: Sync Capacitor
        run: npm run mobile:sync

      - name: Build unsigned iOS app
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ios/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package lite unsigned IPA
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#lite-v}"
          mkdir -p release-lite/ios/Payload
          APP_PATH="$(find ios/DerivedData/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' -type d | head -n 1)"
          test -n "$APP_PATH"
          cp -R "$APP_PATH" release-lite/ios/Payload/
          (cd release-lite/ios && zip -qry "../Colorbook-Echo-${VERSION}-lite-ios-unsigned.ipa" Payload)

      - name: Upload lite iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: lite-ios-ipa
          path: release-lite/*.ipa
          if-no-files-found: error

  release:
    name: Publish Lite GitHub Release
    needs:
      - desktop
      - android
      - ios
    runs-on: ubuntu-latest

    steps:
      - name: Download lite release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish lite release
        uses: softprops/action-gh-release@v2
        with:
          name: 此地有回声 ${{ github.ref_name }} 轻量版
          files: release-artifacts/*
          body: |
            《此地有回声》北京中轴与天津海河双城全平台轻量试玩版。

            这个版本在打包前压缩并降采样了主要图片素材，保留完整游戏流程、本地卡牌场景素材和角色配音引用，适合更快下载和安装测试。

            - `Colorbook-Echo-*-lite-mac-arm64.dmg`：Apple Silicon Mac 轻量版。
            - `Colorbook-Echo-*-lite-mac-x64.dmg`：Intel Mac 轻量版。
            - `Colorbook-Echo-*-lite-windows-x64.exe`：Windows 64 位轻量安装包。
            - `Colorbook-Echo-*-lite-android-debug.apk`：Android 调试签名轻量 APK，可直接安装测试。
            - `Colorbook-Echo-*-lite-ios-unsigned.ipa`：iOS 未签名 IPA，需要使用自己的 Apple 开发者证书重新签名后安装。

            默认不需要后端服务、不需要登录，主要剧情、卡牌、音效与角色配音都随安装包离线运行。
