name: Build Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS DMG
            os: macos-latest
            command: npm run desktop:build -- --mac dmg --x64 --arm64
            artifact: macos-dmg
            files: release/*.dmg
          - name: Windows EXE
            os: windows-latest
            command: npm run desktop:build -- --win nsis --x64
            artifact: windows-exe
            files: release/*.exe

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build desktop package
        run: ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: desktop-artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: 此地有回声 ${{ github.ref_name }}
          files: desktop-artifacts/*
          body: |
            《此地有回声：北京中轴入局》桌面试玩版。

            - `Colorbook-Beijing-*-mac-arm64.dmg`：Apple Silicon Mac。
            - `Colorbook-Beijing-*-mac-x64.dmg`：Intel Mac。
            - `Colorbook-Beijing-*-windows-x64.exe`：Windows 64 位安装包。

            当前版本为本地演示原型，不需要后端服务、不需要登录，也不调用真实 AI 接口。
